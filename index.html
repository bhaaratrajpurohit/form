<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads | Mock Lead Trigger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1877F2;
            /* Meta Blue */
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
        }

        h1 {
            font-weight: 900;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 5px;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: white;
            color: #1c1e21;
            font-size: 15px;
        }

        button {
            background: white;
            color: #1877F2;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        .status {
            margin-top: 20px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Meta Lead Ad</h1>
        <p>Simulation for BroadMind Demo</p>

        <div class="input-group">
            <label>Student Name</label>
            <input type="text" id="name" value="Krishna (Demo Lead)">
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="+91 XXXX XXXX">
        </div>

        <button id="triggerBtn">🚀 Trigger Meta Ad Lead</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        // REPLACE THIS with your n8n /meta-simulation webhook URL
        const MOCK_WEBHOOK_URL = 'YOUR_N8N_META_SIMULATION_URL_HERE';

        document.getElementById('triggerBtn').addEventListener('click', async () => {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const status = document.getElementById('status');

            if (!phone) { alert('Please enter a phone number!'); return; }

            status.innerText = 'Sending Lead to n8n...';

            try {
                const response = await fetch(MOCK_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, source: 'Meta Ads' })
                });

                if (response.ok) {
                    status.innerText = '✅ Lead Fired! Wait for the call...';
                } else {
                    status.innerText = '❌ Error: check n8n URL';
                }
            } catch (e) {
                status.innerText = '❌ Failed to connect to n8n';
            }
        });
    </script>
</body>

</html>
